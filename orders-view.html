<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Вход в админку</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #0a0a0f 0%, #050507 100%);
      color: #ffffff;
      padding: 40px;
      min-height: 100vh;
    }

    .container {
      max-width: 1400px;
      margin: 0 auto;
    }

    /* Header */
    .header {
      margin-bottom: 40px;
      text-align: center;
    }

    .header h1 {
      font-size: 36px;
      font-weight: 700;
      font-family: 'Space Grotesk', sans-serif;
      background: linear-gradient(135deg, #fff, #c084fc);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 12px;
    }

    .stats {
      display: flex;
      gap: 20px;
      justify-content: center;
      margin-bottom: 30px;
    }

    .stat-card {
      background: rgba(139, 92, 246, 0.1);
      border: 1px solid rgba(139, 92, 246, 0.2);
      border-radius: 16px;
      padding: 12px 24px;
      backdrop-filter: blur(10px);
    }

    .stat-number {
      font-size: 28px;
      font-weight: 700;
      color: #c084fc;
    }

    .stat-label {
      font-size: 12px;
      color: rgba(255, 255, 255, 0.6);
      margin-left: 8px;
    }

    /* Таблица */
    .orders-table {
      background: rgba(20, 20, 30, 0.4);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(139, 92, 246, 0.2);
      border-radius: 24px;
      overflow-x: auto;
      margin-bottom: 30px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
    }

    th {
      text-align: left;
      padding: 16px 20px;
      background: rgba(139, 92, 246, 0.1);
      font-weight: 600;
      font-size: 14px;
      color: #c084fc;
      border-bottom: 1px solid rgba(139, 92, 246, 0.2);
    }

    td {
      padding: 14px 20px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.05);
      font-size: 14px;
      color: rgba(255, 255, 255, 0.8);
    }

    tr:hover {
      background: rgba(139, 92, 246, 0.05);
    }

    .services-cell {
      max-width: 300px;
    }

    .services-list {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }

    .service-tag {
      background: rgba(139, 92, 246, 0.15);
      border: 1px solid rgba(139, 92, 246, 0.3);
      border-radius: 20px;
      padding: 4px 10px;
      font-size: 11px;
      color: #c084fc;
    }

    .badge {
      display: inline-block;
      padding: 4px 12px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 500;
    }

    .badge-new {
      background: rgba(139, 92, 246, 0.2);
      color: #c084fc;
    }

    /* Кнопки */
    .actions {
      display: flex;
      gap: 12px;
      justify-content: center;
      margin-top: 20px;
    }

    .btn {
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(139, 92, 246, 0.3);
      border-radius: 40px;
      padding: 10px 24px;
      color: #c084fc;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.3s ease;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      gap: 8px;
    }

    .btn:hover {
      background: rgba(139, 92, 246, 0.15);
      border-color: #8b5cf6;
      transform: translateY(-2px);
    }

    .btn-danger {
      border-color: rgba(239, 68, 68, 0.3);
      color: #ef4444;
    }

    .btn-danger:hover {
      background: rgba(239, 68, 68, 0.1);
      border-color: #ef4444;
    }

    /* Обновление */
    .refresh-info {
      text-align: center;
      font-size: 12px;
      color: rgba(255, 255, 255, 0.4);
      margin-top: 20px;
    }

    /* Пустое состояние */
    .empty-state {
      text-align: center;
      padding: 60px;
    }

    .empty-icon {
      font-size: 64px;
      margin-bottom: 16px;
      opacity: 0.5;
    }

    .empty-state p {
      color: rgba(255, 255, 255, 0.5);
    }

    /* Анимация */
    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(10px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .orders-table {
      animation: fadeIn 0.3s ease;
    }

    /* Login Styles */
    .login-overlay {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: linear-gradient(135deg, #0a0a0f 0%, #050507 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 9999;
    }
    .login-box {
      background: rgba(20, 20, 30, 0.6);
      backdrop-filter: blur(20px);
      border: 1px solid rgba(139, 92, 246, 0.3);
      border-radius: 32px;
      padding: 48px;
      max-width: 400px;
      width: 90%;
      text-align: center;
      box-shadow: 0 0 60px rgba(139, 92, 246, 0.15);
    }
    .login-box h2 {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 28px;
      color: #ffffff;
      margin-bottom: 12px;
    }
    .login-box p {
      color: rgba(255,255,255,0.5);
      font-size: 14px;
      margin-bottom: 32px;
    }
    .login-box input {
      width: 100%;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(139, 92, 246, 0.3);
      border-radius: 16px;
      padding: 14px 18px;
      color: #fff;
      font-size: 16px;
      margin-bottom: 16px;
      outline: none;
      transition: all 0.3s;
    }
    .login-box input:focus {
      border-color: #8b5cf6;
      background: rgba(139, 92, 246, 0.08);
    }
    .login-box button {
      width: 100%;
      background: linear-gradient(135deg, #8b5cf6, #6d28d9);
      border: none;
      border-radius: 60px;
      padding: 14px;
      color: white;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s;
    }
    .login-box button:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 25px rgba(139, 92, 246, 0.4);
    }
    .login-error {
      color: #ef4444;
      font-size: 13px;
      margin-top: 12px;
      display: none;
    }
  </style>
</head>
<body>
  <div id="loginForm" class="login-overlay">
    <div class="login-box">
      <h2>🔐 Вход в админку</h2>
      <p>Введите пароль для доступа к заявкам</p>
      <input type="password" id="passwordInput" placeholder="Пароль" onkeydown="if(event.key==='Enter')checkPassword()">
      <button onclick="checkPassword()">Войти</button>
      <div id="loginError" class="login-error">Неверный пароль</div>
    </div>
  </div>
  <div id="app"></div>

  <script>
    async function checkPassword() {
      const input = document.getElementById('passwordInput').value;
      const error = document.getElementById('loginError');
      const loginForm = document.getElementById('loginForm');

      try {
        const res = await fetch('/api/login', {
          method: 'POST',
          headers: {'Content-Type': 'application/json'},
          body: JSON.stringify({password: input})
        });
        const data = await res.json();

        if (data.success && data.token) {
          sessionStorage.setItem('admin_token', data.token);
          loginForm.style.display = 'none';
          loadAdminContent(data.token);
        } else {
          error.style.display = 'block';
          document.getElementById('passwordInput').value = '';
        }
      } catch (e) {
        error.textContent = 'Ошибка соединения с сервером';
        error.style.display = 'block';
      }
    }

    async function loadAdminContent(token) {
      try {
        const res = await fetch('/api/admin-core?token=' + encodeURIComponent(token));
        if (!res.ok) throw new Error('Forbidden');
        const html = await res.text();
        const app = document.getElementById('app');
        app.innerHTML = html;

        // Выполняем скрипты из загруженного HTML
        const scripts = app.querySelectorAll('script');
        scripts.forEach(oldScript => {
          const newScript = document.createElement('script');
          Array.from(oldScript.attributes).forEach(attr => {
            newScript.setAttribute(attr.name, attr.value);
          });
          newScript.textContent = oldScript.textContent;
          oldScript.replaceWith(newScript);
        });
      } catch (e) {
        document.getElementById('app').innerHTML = '<div style="text-align:center;padding:60px;color:#ef4444">❌ Ошибка загрузки админки. Войдите заново.</div>';
        sessionStorage.removeItem('admin_token');
        document.getElementById('loginForm').style.display = 'flex';
      }
    }

    // Авто-вход если есть токен
    const savedToken = sessionStorage.getItem('admin_token');
    if (savedToken) {
      document.getElementById('loginForm').style.display = 'none';
      loadAdminContent(savedToken);
    }
  </script>
</body>
</html>
